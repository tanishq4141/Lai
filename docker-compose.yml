services:
  db:
    image: postgres:16-alpine
    container_name: lai-postgres
    environment:
      POSTGRES_USER: lai
      POSTGRES_PASSWORD: lai_dev_password
      POSTGRES_DB: lai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
